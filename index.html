<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pronto Studio • Applications</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .glass { backdrop-filter: blur(16px); }
    .input {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .input:focus {
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgb(168 85 247 / 0.15);
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <!-- Top Bar -->
  <nav class="border-b border-zinc-800 bg-zinc-950/70 glass sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-8 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-violet-600 rounded-2xl flex items-center justify-center text-3xl shadow-xl">
          ⚡
        </div>
        <div class="font-bold text-3xl tracking-tighter">Pronto Studio</div>
      </div>
      
      <div class="flex items-center gap-6 text-sm">
        <button onclick="showOwnerPanel()" 
          class="flex items-center gap-2 px-5 py-2.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-2xl transition">
          <i class="fa-solid fa-shield-halved"></i>
          <span>Owner Access</span>
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-2xl mx-auto px-6 pt-16 pb-24">
    
    <div class="text-center mb-12">
      <h1 class="text-6xl font-bold tracking-tighter mb-4">Join Pronto Studio</h1>
      <p class="text-zinc-400 text-xl">Creator or Staff Application</p>
    </div>

    <!-- Modern Toggle -->
    <div class="flex bg-zinc-900 p-1.5 rounded-3xl max-w-md mx-auto mb-16 shadow-inner">
      <button onclick="switchTab(0)" id="tab0"
        class="flex-1 py-4 text-lg font-semibold rounded-3xl transition-all duration-300">
        Creator Application
      </button>
      <button onclick="switchTab(1)" id="tab1"
        class="flex-1 py-4 text-lg font-semibold rounded-3xl transition-all duration-300">
        Staff Application
      </button>
    </div>

    <!-- Form Card -->
    <div class="bg-zinc-900/70 glass border border-zinc-700/50 rounded-3xl p-10 shadow-2xl">
      <form id="mainForm" action="https://formsubmit.co/YOUR_EMAIL@gmail.com" method="POST" class="space-y-8">

        <input type="hidden" name="_subject" id="subject" value="NEW CREATOR APPLICATION">
        <input type="hidden" name="_template" value="table">

        <!-- Full Name -->
        <div>
          <label class="text-zinc-400 text-sm font-medium mb-2 block">Full Name <span class="text-red-500">*</span></label>
          <input type="text" name="full_name" required
            class="input w-full bg-zinc-800 border border-zinc-700 focus:border-purple-500 rounded-2xl px-6 py-5 text-lg outline-none">
        </div>

        <!-- Email -->
        <div>
          <label class="text-zinc-400 text-sm font-medium mb-2 block">Email Address <span class="text-red-500">*</span></label>
          <input type="email" name="email" required
            class="input w-full bg-zinc-800 border border-zinc-700 focus:border-purple-500 rounded-2xl px-6 py-5 text-lg outline-none">
        </div>

        <!-- Dynamic Fields -->
        <div id="dynamicContent" class="space-y-8"></div>

        <!-- Social Links -->
        <div>
          <label class="text-zinc-400 text-sm font-medium mb-2 block">Social Media Links</label>
          <input type="text" name="social_links" placeholder="Instagram, TikTok, YouTube, X (comma separated)"
            class="input w-full bg-zinc-800 border border-zinc-700 focus:border-purple-500 rounded-2xl px-6 py-5 text-lg outline-none">
        </div>

        <!-- Portfolio -->
        <div>
          <label class="text-zinc-400 text-sm font-medium mb-2 block">Portfolio / Website</label>
          <input type="url" name="portfolio" placeholder="https://yourportfolio.com"
            class="input w-full bg-zinc-800 border border-zinc-700 focus:border-purple-500 rounded-2xl px-6 py-5 text-lg outline-none">
        </div>

        <button type="submit" 
          class="w-full mt-8 bg-gradient-to-r from-purple-600 to-violet-600 hover:from-purple-700 hover:to-violet-700 py-7 rounded-3xl font-bold text-xl transition-all active:scale-95">
          Submit Application
        </button>
      </form>
    </div>
  </div>

  <!-- Owner / Staff Panel Modal -->
  <div id="ownerModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[100]">
    <div class="bg-zinc-900 rounded-3xl p-10 max-w-md w-full border border-purple-500/30">
      <h2 class="text-3xl font-bold mb-8 text-center">Owner / Staff Panel</h2>
      <p class="text-zinc-400 text-center mb-8">Enter password to access management panel</p>
      
      <input type="password" id="ownerPass" placeholder="Enter owner password"
        class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 text-lg mb-6 outline-none focus:border-purple-500">
      
      <div class="flex gap-4">
        <button onclick="hideOwnerPanel()" 
          class="flex-1 py-4 border border-zinc-700 rounded-2xl font-medium">Cancel</button>
        <button onclick="checkOwnerPassword()" 
          class="flex-1 py-4 bg-purple-600 hover:bg-purple-700 rounded-2xl font-medium">Unlock Panel</button>
      </div>
      
      <p id="ownerError" class="text-red-500 text-center mt-4 hidden">Incorrect password</p>
    </div>
  </div>

  <script>
    let currentTab = 0;
    const correctOwnerPassword = "owner123"; // ← CHANGE THIS TO YOUR SECURE PASSWORD

    function switchTab(tab) {
      currentTab = tab;
      
      document.getElementById('tab0').classList.toggle('bg-zinc-800', tab === 0);
      document.getElementById('tab1').classList.toggle('bg-zinc-800', tab === 1);
      
      const dynamic = document.getElementById('dynamicContent');
      const subject = document.getElementById('subject');

      if (tab === 0) { // Creator
        subject.value = "NEW CREATOR APPLICATION";
        dynamic.innerHTML = `
          <div>
            <label class="text-zinc-400 text-sm font-medium mb-2 block">Content Niche <span class="text-red-500">*</span></label>
            <select name="niche" required class="input w-full bg-zinc-800 border border-zinc-700 focus:border-purple-500 rounded-2xl px-6 py-5 text-lg outline-none">
              <option value="">Select your content niche...</option>
              <option value="Gaming">Gaming</option>
              <option value="Lifestyle">Lifestyle / Vlogs</option>
              <option value="Tech">Tech & Reviews</option>
              <option value="Fashion">Fashion / Beauty</option>
              <option value="Comedy">Comedy / Skits</option>
              <option value="Music">Music</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div>
            <label class="text-zinc-400 text-sm font-medium mb-2 block">Average Views <span class="text-red-500">*</span></label>
            <input type="text" name="avg_views" placeholder="e.g. 200K per video" required
              class="input w-full bg-zinc-800 border border-zinc-700 focus:border-purple-500 rounded-2xl px-6 py-5 text-lg outline-none">
          </div>

          <div>
            <label class="text-zinc-400 text-sm font-medium mb-2 block">Why do you want to join Pronto Studio? <span class="text-red-500">*</span></label>
            <textarea name="message" rows="4" required placeholder="Be honest and detailed..."
              class="input w-full bg-zinc-800 border border-zinc-700 focus:border-purple-500 rounded-2xl px-6 py-5 text-lg outline-none"></textarea>
          </div>
        `;
      } else { // Staff
        subject.value = "NEW STAFF APPLICATION";
        dynamic.innerHTML = `
          <div>
            <label class="text-zinc-400 text-sm font-medium mb-2 block">Discord Username <span class="text-red-500">*</span></label>
            <input type="text" name="discord" placeholder="@yourusername" required
              class="input w-full bg-zinc-800 border border-zinc-700 focus:border-purple-500 rounded-2xl px-6 py-5 text-lg outline-none">
          </div>

          <div>
            <label class="text-zinc-400 text-sm font-medium mb-2 block">Role you're applying for & Experience <span class="text-red-500">*</span></label>
            <textarea name="experience" rows="5" required placeholder="What role? Moderator, Editor, Manager, etc. + your experience..."
              class="input w-full bg-zinc-800 border border-zinc-700 focus:border-purple-500 rounded-2xl px-6 py-5 text-lg outline-none"></textarea>
          </div>
        `;
      }
    }

    function showOwnerPanel() {
      document.getElementById('ownerModal').classList.remove('hidden');
      document.getElementById('ownerPass').focus();
    }

    function hideOwnerPanel() {
      document.getElementById('ownerModal').classList.add('hidden');
      document.getElementById('ownerError').classList.add('hidden');
    }

    function checkOwnerPassword() {
      const pass = document.getElementById('ownerPass').value;
      if (pass === correctOwnerPassword) {
        hideOwnerPanel();
        alert("✅ Welcome Owner! Staff management panel would open here.\n\n(You can later replace this alert with a real dashboard)");
        // Future: window.location = "staff-panel.html";
      } else {
        document.getElementById('ownerError').classList.remove('hidden');
      }
    }

    // Initialize
    window.onload = () => {
      switchTab(0);
    };
  </script>
</body>
</html>
