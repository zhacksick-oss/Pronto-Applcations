<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pronto Studio • Apply</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
    }
    .hero-bg {
      background-image: linear-gradient(rgba(10,10,20,0.78), rgba(10,10,20,0.88)), 
                        url('4189768043_11177482306_1775174078082.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    .glass {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .input {
      transition: all 0.3s ease;
    }
    .input:focus {
      border-color: rgb(168 85 247);
      box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.15);
      transform: translateY(-1px);
    }
  </style>
</head>
<body class="hero-bg min-h-screen text-white">

  <div class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-4xl w-full">

      <!-- Header -->
      <div class="text-center mb-16">
        <div class="flex justify-center mb-6">
          <div class="w-28 h-28 bg-gradient-to-br from-purple-500 via-violet-500 to-fuchsia-500 rounded-3xl flex items-center justify-center text-7xl shadow-2xl shadow-purple-500/50">
            ⚡
          </div>
        </div>
        <h1 class="text-6xl font-bold tracking-tighter neon-text">PRONTO STUDIO</h1>
        <p class="text-xl text-zinc-300 mt-4">Join the Movement</p>
      </div>

      <!-- Modern Tabs -->
      <div class="flex justify-center mb-12">
        <div class="glass rounded-3xl p-1.5 flex">
          <button onclick="switchTab(0)" id="tab0"
            class="px-10 py-4 rounded-3xl font-semibold text-lg transition-all">Creator Application</button>
          <button onclick="switchTab(1)" id="tab1"
            class="px-10 py-4 rounded-3xl font-semibold text-lg transition-all">Staff Application</button>
        </div>
      </div>

      <!-- Creator Form -->
      <div id="creator-form" class="glass rounded-3xl p-12">
        <h2 class="text-4xl font-bold mb-10 text-center">Creator Application</h2>
        <form onsubmit="submitCreator(event)" class="space-y-8">
          <div class="grid md:grid-cols-2 gap-8">
            <div>
              <label class="block text-sm text-zinc-300 mb-3">Full Name <span class="text-red-500">*</span></label>
              <input type="text" id="c-name" required 
                class="input w-full bg-zinc-900/70 border border-zinc-700 rounded-2xl px-7 py-5 text-lg focus:border-purple-500 outline-none">
            </div>
            <div>
              <label class="block text-sm text-zinc-300 mb-3">Email Address <span class="text-red-500">*</span></label>
              <input type="email" id="c-email" required 
                class="input w-full bg-zinc-900/70 border border-zinc-700 rounded-2xl px-7 py-5 text-lg focus:border-purple-500 outline-none">
            </div>
          </div>

          <div>
            <label class="block text-sm text-zinc-300 mb-3">Social Media Links</label>
            <input type="text" id="c-social" placeholder="Instagram, TikTok, YouTube, X..." 
              class="input w-full bg-zinc-900/70 border border-zinc-700 rounded-2xl px-7 py-5 text-lg focus:border-purple-500 outline-none">
          </div>

          <div class="grid md:grid-cols-2 gap-8">
            <div>
              <label class="block text-sm text-zinc-300 mb-3">Portfolio / Website</label>
              <input type="url" id="c-portfolio" placeholder="https://" 
                class="input w-full bg-zinc-900/70 border border-zinc-700 rounded-2xl px-7 py-5 text-lg focus:border-purple-500 outline-none">
            </div>
            <div>
              <label class="block text-sm text-zinc-300 mb-3">Content Niche <span class="text-red-500">*</span></label>
              <select id="c-niche" required 
                class="input w-full bg-zinc-900/70 border border-zinc-700 rounded-2xl px-7 py-5 text-lg focus:border-purple-500 outline-none">
                <option value="">Select your niche...</option>
                <option value="Gaming">Gaming</option>
                <option value="Comedy">Comedy / Skits</option>
                <option value="Tech">Tech</option>
                <option value="Lifestyle">Lifestyle</option>
                <option value="Fashion">Fashion</option>
                <option value="Music">Music</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>

          <div>
            <label class="block text-sm text-zinc-300 mb-3">Why do you want to join Pronto Studio? <span class="text-red-500">*</span></label>
            <textarea id="c-why" rows="6" required placeholder="Be honest and detailed..." 
              class="input w-full bg-zinc-900/70 border border-zinc-700 rounded-3xl px-7 py-5 text-lg focus:border-purple-500 outline-none resize-none"></textarea>
          </div>

          <button type="submit" 
            class="w-full py-7 bg-gradient-to-r from-purple-600 via-violet-600 to-fuchsia-600 rounded-3xl font-bold text-2xl hover:brightness-110 transition-all active:scale-95">
            Submit Creator Application
          </button>
        </form>
      </div>

      <!-- Staff Form -->
      <div id="staff-form" class="glass rounded-3xl p-12 hidden">
        <h2 class="text-4xl font-bold mb-10 text-center">Staff Application</h2>
        <form onsubmit="submitStaff(event)" class="space-y-8">
          <div class="grid md:grid-cols-2 gap-8">
            <div>
              <label class="block text-sm text-zinc-300 mb-3">Full Name <span class="text-red-500">*</span></label>
              <input type="text" id="s-name" required 
                class="input w-full bg-zinc-900/70 border border-zinc-700 rounded-2xl px-7 py-5 text-lg focus:border-cyan-500 outline-none">
            </div>
            <div>
              <label class="block text-sm text-zinc-300 mb-3">Email Address <span class="text-red-500">*</span></label>
              <input type="email" id="s-email" required 
                class="input w-full bg-zinc-900/70 border border-zinc-700 rounded-2xl px-7 py-5 text-lg focus:border-cyan-500 outline-none">
            </div>
          </div>

          <div>
            <label class="block text-sm text-zinc-300 mb-3">Role Applying For <span class="text-red-500">*</span></label>
            <select id="s-role" required 
              class="input w-full bg-zinc-900/70 border border-zinc-700 rounded-2xl px-7 py-5 text-lg focus:border-cyan-500 outline-none">
              <option value="">Select role...</option>
              <option value="Moderator">Moderator</option>
              <option value="Editor">Editor</option>
              <option value="Reviewer">Content Reviewer</option>
              <option value="Manager">Manager</option>
              <option value="Admin">Admin</option>
            </select>
          </div>

          <div>
            <label class="block text-sm text-zinc-300 mb-3">Why should we hire you? <span class="text-red-500">*</span></label>
            <textarea id="s-why" rows="7" required placeholder="Tell us about your experience and why you're perfect for the team..." 
              class="input w-full bg-zinc-900/70 border border-zinc-700 rounded-3xl px-7 py-5 text-lg focus:border-cyan-500 outline-none resize-none"></textarea>
          </div>

          <button type="submit" 
            class="w-full py-7 bg-gradient-to-r from-cyan-500 to-teal-500 rounded-3xl font-bold text-2xl hover:brightness-110 transition-all active:scale-95">
            Submit Staff Application
          </button>
        </form>
      </div>

      <p class="text-center text-zinc-400 text-sm mt-10">
        All applications are sent directly to the team via Discord
      </p>
    </div>
  </div>

  <script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1477127903736234157/mALJT5iM6LOD2lcpXyoWIQDha9FNbL7HjgL0AP8OExi19wNAQWcZ3yoFPd2eW6V_aO1Q";

    function switchTab(n) {
      document.getElementById('creator-form').classList.toggle('hidden', n !== 0);
      document.getElementById('staff-form').classList.toggle('hidden', n !== 1);
      
      document.getElementById('tab0').classList.toggle('bg-zinc-800', n === 0);
      document.getElementById('tab1').classList.toggle('bg-zinc-800', n === 1);
    }

    async function sendToDiscord(title, color, fields) {
      try {
        await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: "Pronto Bot",
            embeds: [{ title, color, fields, timestamp: new Date().toISOString() }]
          })
        });
      } catch (e) {}
    }

    function submitCreator(e) {
      e.preventDefault();
      const fields = [
        { name: "Name", value: document.getElementById("c-name").value, inline: true },
        { name: "Email", value: document.getElementById("c-email").value, inline: true },
        { name: "Social Media", value: document.getElementById("c-social").value || "None" },
        { name: "Portfolio", value: document.getElementById("c-portfolio").value || "None" },
        { name: "Niche", value: document.getElementById("c-niche").value || "Not selected" },
        { name: "Why Join?", value: document.getElementById("c-why").value }
      ];

      sendToDiscord("🎥 New Creator Application", 0xa855f7, fields);
      alert("✅ Creator Application submitted successfully!\nThe team has been notified.");
      e.target.reset();
    }

    function submitStaff(e) {
      e.preventDefault();
      const fields = [
        { name: "Name", value: document.getElementById("s-name").value, inline: true },
        { name: "Email", value: document.getElementById("s-email").value, inline: true },
        { name: "Role", value: document.getElementById("s-role").value },
        { name: "Why Hire You?", value: document.getElementById("s-why").value }
      ];

      sendToDiscord("🛡️ New Staff Application", 0x22d3ee, fields);
      alert("✅ Staff Application submitted successfully!\nThe team has been notified.");
      e.target.reset();
    }

    window.onload = () => switchTab(0);
  </script>
</body>
</html>
