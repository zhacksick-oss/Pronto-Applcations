<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pronto Studio • Apply</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { 
      font-family: 'Inter', system-ui, sans-serif; 
      background-image: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), url('bg.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
  </style>
</head>
<body class="text-white min-h-screen">

  <nav class="bg-zinc-900 border-b border-zinc-700">
    <div class="max-w-4xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-violet-600 rounded-2xl flex items-center justify-center text-2xl">⚡</div>
        <span class="font-bold text-2xl">Pronto Studio</span>
      </div>
      <div class="text-lg font-medium">Applications</div>
    </div>
  </nav>

  <!-- Home Page -->
  <div id="home" class="max-w-4xl mx-auto px-6 py-20 text-center">
    <h1 class="text-5xl font-bold mb-6">Join Pronto Studio</h1>
    <p class="text-zinc-300 text-xl mb-12">Choose your application type</p>

    <div class="grid md:grid-cols-2 gap-8 max-w-2xl mx-auto">
      <div onclick="goTo('creator')" class="bg-zinc-900/90 p-10 rounded-3xl cursor-pointer hover:scale-105 transition">
        <div class="text-6xl mb-6">📸</div>
        <h2 class="text-3xl font-bold">Creator Application</h2>
        <p class="text-zinc-400 mt-3">Become a content creator</p>
      </div>

      <div onclick="goTo('staff')" class="bg-zinc-900/90 p-10 rounded-3xl cursor-pointer hover:scale-105 transition">
        <div class="text-6xl mb-6">🛡️</div>
        <h2 class="text-3xl font-bold">Staff Application</h2>
        <p class="text-zinc-400 mt-3">Join the team</p>
      </div>
    </div>
  </div>

  <!-- Creator Form -->
  <div id="creator" class="hidden max-w-3xl mx-auto px-6 py-12">
    <button onclick="back()" class="mb-8 text-zinc-400 hover:text-white">← Back</button>
    <h1 class="text-4xl font-bold mb-8">Creator Application</h1>
    <div class="bg-zinc-900 rounded-3xl p-10">
      <form onsubmit="submitCreator(event)">
        <div class="space-y-6">
          <div>
            <label class="block text-zinc-400 mb-2">Full Name *</label>
            <input type="text" id="cname" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
          </div>
          <div>
            <label class="block text-zinc-400 mb-2">Email *</label>
            <input type="email" id="cemail" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
          </div>
          <div>
            <label class="block text-zinc-400 mb-2">Content Niche *</label>
            <select id="cnich" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
              <option value="">Select...</option>
              <option value="Gaming">Gaming</option>
              <option value="Comedy">Comedy</option>
              <option value="Tech">Tech</option>
              <option value="Lifestyle">Lifestyle</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div>
            <label class="block text-zinc-400 mb-2">Why join us? *</label>
            <textarea id="cwhy" rows="4" required class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-4"></textarea>
          </div>
        </div>
        <button type="submit" class="mt-8 w-full bg-violet-600 py-5 rounded-3xl font-bold">Submit Creator Application</button>
      </form>
    </div>
  </div>

  <!-- Staff Form -->
  <div id="staff" class="hidden max-w-3xl mx-auto px-6 py-12">
    <button onclick="back()" class="mb-8 text-zinc-400 hover:text-white">← Back</button>
    <h1 class="text-4xl font-bold mb-8">Staff Application</h1>
    <div class="bg-zinc-900 rounded-3xl p-10">
      <form onsubmit="submitStaff(event)">
        <div class="space-y-6">
          <div>
            <label class="block text-zinc-400 mb-2">Full Name *</label>
            <input type="text" id="sname" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
          </div>
          <div>
            <label class="block text-zinc-400 mb-2">Email *</label>
            <input type="email" id="semail" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
          </div>
          <div>
            <label class="block text-zinc-400 mb-2">Role *</label>
            <select id="srole" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
              <option value="">Select role...</option>
              <option value="Moderator">Moderator</option>
              <option value="Editor">Editor</option>
              <option value="Manager">Manager</option>
            </select>
          </div>
          <div>
            <label class="block text-zinc-400 mb-2">Why should we hire you? *</label>
            <textarea id="swhy" rows="4" required class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-4"></textarea>
          </div>
        </div>
        <button type="submit" class="mt-8 w-full bg-cyan-600 py-5 rounded-3xl font-bold">Submit Staff Application</button>
      </form>
    </div>
  </div>

  <script>
    const WEBHOOK = "https://discord.com/api/webhooks/1477127903736234157/mALJT5iM6LOD2lcpXyoWIQDha9FNbL7HjgL0AP8OExi19wNAQWcZ3yoFPd2eW6V_aO1Q";

    function showCreator() {
      document.getElementById("home").classList.add("hidden");
      document.getElementById("creator").classList.remove("hidden");
    }

    function showStaff() {
      document.getElementById("home").classList.add("hidden");
      document.getElementById("staff").classList.remove("hidden");
    }

    function back() {
      document.getElementById("creator").classList.add("hidden");
      document.getElementById("staff").classList.add("hidden");
      document.getElementById("home").classList.remove("hidden");
    }

    async function sendWebhook(title, fields) {
      const payload = {
        content: "@everyone",
        embeds: [{
          title: title,
          color: 0xe879f9,   // Pink color
          fields: fields,
          timestamp: new Date().toISOString()
        }]
      };

      try {
        await fetch(WEBHOOK, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload)
        });
      } catch(e) {}
    }

    function submitCreator(e) {
      e.preventDefault();
      const fields = [
        {name: "Name", value: document.getElementById("cname").value},
        {name: "Email", value: document.getElementById("cemail").value},
        {name: "Niche", value: document.getElementById("cnich").value},
        {name: "Why Join", value: document.getElementById("cwhy").value}
      ];
      sendWebhook("🎥 New Creator Application", fields);
      alert("Application sent!");
      back();
    }

    function submitStaff(e) {
      e.preventDefault();
      const fields = [
        {name: "Name", value: document.getElementById("sname").value},
        {name: "Email", value: document.getElementById("semail").value},
        {name: "Role", value: document.getElementById("srole").value},
        {name: "Why Hire", value: document.getElementById("swhy").value}
      ];
      sendWebhook("🛡️ New Staff Application", fields);
      alert("Application sent!");
      back();
    }
  </script>
</body>
</html>
